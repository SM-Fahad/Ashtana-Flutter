name: ashtana
description: An ecommerce application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.1.0  # For making API calls
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0        # NEW: SQLite database
  path_provider: ^2.1.0  # NEW: For database path
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/categories/
    - assets/products/